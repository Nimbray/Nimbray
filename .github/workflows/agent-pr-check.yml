name: Agent PR Check

on:
  pull_request:
    branches: [main]

jobs:
  validate-agent-pr:
    name: Validate agent contribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate branch, handoff and changelog
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: npm run agent:pr-check -- --branch "$HEAD_REF"
