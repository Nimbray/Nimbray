name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show package files
        run: |
          node -v
          npm -v
          cat package.json

      - name: Install dependencies
        run: npm install

      - name: Debug dependencies
        run: |
          npm list next react react-dom || true
          ls -la node_modules || true
          ls -la node_modules/.bin || true

      - name: Verify Next.js installation
        run: npm exec --package=next@14.2.35 -- next --version

      - name: Check official source
        run: npm run source:check

      - name: Agent merge check
        run: npm run agent:merge-check

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm exec --package=next@14.2.35 -- next build