name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Show environment
        run: |
          node -v
          npm -v
          pnpm -v
          pwd
          ls -la
          cat package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify Next.js installation
        run: pnpm exec next --version

      - name: Check official source
        run: pnpm run source:check

      - name: Agent merge check
        run: pnpm run agent:merge-check

      - name: Lint
        run: pnpm run lint || echo "No lint script, skipping."

      - name: Typecheck
        run: pnpm run typecheck || echo "No typecheck script, skipping."

      - name: Build
        run: pnpm exec next build
