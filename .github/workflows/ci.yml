name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          cat package.json

      - name: Install dependencies
        run: |
          npm install
          npm install next@14.2.35 react@18.3.1 react-dom@18.3.1

      - name: Debug Next installation
        run: |
          npm list next react react-dom || true
          ls -la node_modules/next || true
          ls -la node_modules/next/dist/bin || true
          node node_modules/next/dist/bin/next --version

      - name: Check official source
        run: npm run source:check

      - name: Agent merge check
        run: npm run agent:merge-check

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: node node_modules/next/dist/bin/next build
